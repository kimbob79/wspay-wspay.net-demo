server {
    server_name gnushop.xyz;

    root /data/www/gnushop.xyz/php/www;
    index index.php index.html index.htm;

    server_tokens off;

    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/main.conf;

    access_log /data/nginx/logs/gnushop_access.log;
    error_log  /data/nginx/logs/gnushop_error.log;

    # ── 보안 헤더 ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://code.jquery.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # ── PHP 버전 노출 차단 ──
    fastcgi_hide_header X-Powered-By;
    proxy_hide_header X-Powered-By;

    # 1. 숨김 파일 및 디렉토리 접근 차단 (가장 중요)
    # .env, .git, .htaccess, .DS_Store 등을 한방에 막아줍니다.
    # 단, SSL 인증서 발급용 폴더인 .well-known은 제외합니다.
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # 2. 실행 파일, 백업, DB, 설정 파일 등 위험 확장자 차단
    # ~* 는 대소문자 구분 없이 막겠다는 뜻입니다 (.SQL, .sql 모두 차단)
    location ~* \.(py|sh|log|sql|db|sqlite|bak|old|swp|ini|conf|yaml|yml)$ {
        deny all;
        return 404;
    }

    # API v1 Endpoints
    location ~ ^/api/v1/url-payment/create/?$ {
        rewrite ^ /api/v1/url_payment_create.php last;
    }
    location ~ ^/api/v1/url-payment/list/?$ {
        rewrite ^ /api/v1/url_payment_list.php last;
    }
    location ~ ^/api/v1/url-payment/detail/?$ {
        rewrite ^ /api/v1/url_payment_detail.php last;
    }
    location ~ ^/api/v1/url-payment/cancel/?$ {
        rewrite ^ /api/v1/url_payment_cancel.php last;
    }
    location ~ ^/api/v1/url-payment/resend-sms/?$ {
        rewrite ^ /api/v1/url_payment_resend_sms.php last;
    }
    location ~ ^/api/v1/url-payment/pg-list/?$ {
        rewrite ^ /api/v1/url_payment_pg_list.php last;
    }

    # 수기결제
    location /pay {
        # URL결제 (9자리 영숫자 코드) - 먼저 체크
        rewrite "^/pay/([A-Za-z0-9]{9})$" /url_payment_public.php?code=$1 last;
        rewrite ^/pay/?$ /index.php?p=manual_payment last;
    }

    # 메인 페이지
    location /main {
        rewrite ^/main/?$ /index.php?p=main last;
    }

     # 결제 관련
    location /txn {
        rewrite ^/txn/?$ /index.php?p=payment last;
        rewrite ^/txn/merchant/?$ /index.php?p=payment_member last;
        rewrite ^/txn/missing/?$ /index.php?p=payment_loss last;
        rewrite ^/txn/daily/?$ /index.php?p=payment_day last;
        rewrite ^/txn/cancel/?$ /index.php?p=cancel_payment last;
        rewrite ^/txn/memo/?$ /index.php?p=payment_memo last;
        rewrite ^/txn/fds/?$ /index.php?p=payment_fds last;
    }

    # 정산 관련
    location /calc {
        rewrite ^/calc/?$ /index.php?p=settlement last;
        rewrite ^/calc/simple/?$ /index.php?p=settlement_master2 last;
        rewrite ^/calc/store/?$ /index.php?p=settlement_master3 last;
    }

    # 차액정산
    location /diff {
        rewrite ^/diff/member/?$ /index.php?p=sftp_member last;
        rewrite ^/diff/tid/?$ /index.php?p=sftp_tid last;
        rewrite ^/diff/data/?$ /index.php?p=sftp_payment last;
        rewrite ^/diff/files/?$ /index.php?p=sftp_data last;
    }

    # 수수료 / TID 관리
    location /fee {
        rewrite ^/fee/?$ /index.php?p=tid_fee last;
        rewrite ^/fee/alt/?$ /index.php?p=tid_fee2 last;
        rewrite ^/fee/tid/?$ /index.php?p=tid_pay last;
    }

    location /manage {
        rewrite ^/manage/tid/?$ /index.php?p=adm_tid last;
    }

    # 회원 / 접속 정보
    location /access {
        rewrite ^/access/?$ /index.php?p=member_info last;
    }

    location /store {
        rewrite ^/store/?$ /index.php?p=member last;
    }

    # 게시판
    location /board {
        rewrite ^/board/?$ /index.php?p=bbs last;
    }

    # 로그아웃
    location /logout {
        rewrite ^/logout/?$ /index.php?p=logout last;
    }

    # -------------------------
    # 기본 라우팅 (항상 마지막)
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP 처리
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/gnushop.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gnushop.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = gnushop.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name gnushop.xyz;
    return 404; # managed by Certbot

}

